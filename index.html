<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <span class="logo">✦ Life Dashboard</span>
    <button class="btn-icon" id="btnTheme" title="Ganti tema">
      <span id="themeIcon">☀️</span>
    </button>
  </header>

  <main class="grid">

    <!-- Greeting -->
    <section class="card card-greeting span-2">
      <div class="greeting-content">
        <p class="greeting-sub" id="greetingText">Selamat datang</p>
        <h1 class="greeting-name">Halo, <span id="userName">Pengguna</span> 👋</h1>
        <div class="datetime">
          <span class="time" id="clock">00:00:00</span>
          <span class="date-sep">·</span>
          <span class="date-text" id="dateText"></span>
        </div>
      </div>
      <button class="btn-ghost" id="btnChangeName">✏️ Ubah nama</button>
    </section>

    <!-- Focus Timer -->
    <section class="card card-timer">
      <h2 class="card-title">⏱ Fokus Timer</h2>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">Siap mulai</div>
      <div class="timer-controls">
        <button class="btn-timer start" id="btnStart">▶ Mulai</button>
        <button class="btn-timer stop" id="btnStop" disabled>⏸ Berhenti</button>
        <button class="btn-timer reset" id="btnReset">↺ Reset</button>
      </div>
      <div class="timer-setting">
        <label for="timerDuration">Durasi (menit)</label>
        <input type="number" id="timerDuration" value="25" min="1" max="120">
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card card-todo">
      <h2 class="card-title">📋 To-Do List</h2>
      <div class="todo-input-wrap">
        <input type="text" id="todoInput" placeholder="Tambah tugas baru..." maxlength="100">
        <button class="btn-add" id="btnAddTodo">+</button>
      </div>
      <div class="todo-filter">
        <button class="filter-btn active" data-filter="semua">Semua</button>
        <button class="filter-btn" data-filter="aktif">Aktif</button>
        <button class="filter-btn" data-filter="selesai">Selesai</button>
        <button class="filter-btn" id="btnSort">↕ Urutkan</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <p class="empty-msg" id="todoEmpty">Belum ada tugas. Yuk tambahkan!</p>
    </section>

    <!-- Quick Links -->
    <section class="card card-links span-2">
      <div class="card-title-row">
        <h2 class="card-title">🔗 Tautan Cepat</h2>
        <button class="btn-ghost" id="btnAddLink">+ Tambah</button>
      </div>
      <div class="links-grid" id="linksGrid"></div>
      <p class="empty-msg" id="linksEmpty">Belum ada tautan. Tambahkan favoritmu!</p>
    </section>

  </main>

  <!-- Modal: Nama -->
  <div class="modal-overlay hidden" id="modalName">
    <div class="modal">
      <h3>Ubah Nama</h3>
      <input type="text" id="nameInput" placeholder="Masukkan namamu..." maxlength="30">
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelName">Batal</button>
        <button class="btn-save" id="btnSaveName">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal: Link -->
  <div class="modal-overlay hidden" id="modalLink">
    <div class="modal">
      <h3>Tambah Tautan</h3>
      <input type="text" id="linkLabel" placeholder="Nama (contoh: YouTube)" maxlength="20">
      <input type="url" id="linkUrl" placeholder="URL (contoh: https://youtube.com)">
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelLink">Batal</button>
        <button class="btn-save" id="btnSaveLink">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal: Edit Todo -->
  <div class="modal-overlay hidden" id="modalEdit">
    <div class="modal">
      <h3>Edit Tugas</h3>
      <input type="text" id="editInput" placeholder="Nama tugas..." maxlength="100">
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelEdit">Batal</button>
        <button class="btn-save" id="btnSaveEdit">Simpan</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/script.js"></script>
</body>
</html>
